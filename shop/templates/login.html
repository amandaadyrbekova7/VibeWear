{% extends 'base.html' %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Вход</h1>
        <p class="auth-subtitle">Войдите в аккаунт, чтобы оформить заказ</p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Войти</button>
        </form>

        <p class="auth-bottom-text">
            Нет аккаунта?
            <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</section>
{% endblock %}
